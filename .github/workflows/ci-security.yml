name: CI Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --dev

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Bandit
        run: uv run bandit -r src -x tests

      - name: pip-audit
        # CVE-2026-4539: ReDoS in pygments AdlLexer (archetype.py).
        # Transitive dep via pytest/rich. No fix available upstream yet.
        # Remove --ignore-vuln once pygments releases a patched version.
        run: uv run pip-audit --ignore-vuln CVE-2026-4539

      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
